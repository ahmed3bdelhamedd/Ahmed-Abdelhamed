<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Abdelhamed | Data Analyst</title>
    <style>
        :root { --accent: #00c2ff; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        
        /* تأثير الخلفية المتحركة */
        .blob { position: absolute; width: 300px; height: 300px; background: var(--accent); filter: blur(150px); border-radius: 50%; animation: move 10s infinite alternate; opacity: 0.15; }
        @keyframes move { from { transform: translate(-100px, -100px); } to { transform: translate(100px, 100px); } }

        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; z-index: 1; transition: 0.5s; }
        .card:hover { transform: scale(1.02); border-color: var(--accent); }

        /* تنسيق الصورة */
        .profile-img { width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 20px; object-fit: cover; box-shadow: 0 0 20px rgba(0,194,255,0.3); }

        h1 { margin: 10px 0; font-size: 2rem; }
        .btn { display: inline-block; padding: 10px 25px; border: 1px solid var(--accent); color: var(--accent); text-decoration: none; border-radius: 30px; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: var(--accent); color: #000; }
    </style>
</head>
<body>

<div class="blob"></div>

<div class="card">
    <!-- ضع هنا اسم ملف صورتك كما هو في ملفاتك (مثل me.jpg) -->
    <img src="me.jpg" alt="Ahmed Abdelhamed" class="profile-img">
    <h1>Ahmed Abdelhamed</h1>
    <p>Data Analyst & Business Intelligence Enthusiast</p>
    <a href="cv.pdf" download class="btn">Download CV</a>
</div>

</body>
</html>
